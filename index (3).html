<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohmad Sahil</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }


/* this is the main body settings for the entire page */
  body {
    font-family: 'Inter', sans-serif;
    height: 500vh; /* for scrolling */
    overflow: scroll;
    display: grid;
    grid-template-columns: 18% 64% 18%;
  }

  .side { background: #ffffff; position: relative; }

/* this is the main container for the content in the center column */
  .center {
    background: #111;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  /*this is main MOHMAD SAHIL position settings*/
  .name-wrap {
    position: fixed;
    top: 50%;
    left: 0;
    width: 100vw;
    transform: translateY(-50%);
    display: flex;
    justify-content: center;
    z-index: 10;
    pointer-events: none;
  }

  /* this is the main MOHMAD SAHIL text */
  .name {
    font-size: clamp(5rem, 10vw, 10rem);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.02em;
    white-space: nowrap;
  }

  .i-am {
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    position: relative;
    z-index: 1;
    margin-bottom: 5.5rem;
  }

  .roles {
    position: relative;
    z-index: 1;
    margin-top: 5.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.55);
  }

  .nav-left {
    position: absolute;
    top: 1.8rem;
    left: 2rem;
    font-size: 0.7rem;
    color: #111;
  }

  .nav-center {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 3rem;
    padding: 1.8rem 0;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.4);
    list-style: none;
    z-index: 2;
  }

  .nav-right {
    position: absolute;
    top: 1.8rem;
    right: 2rem;
    font-size: 0.7rem;
    color: #111;
  }

  .socials {
    position: absolute;
    bottom: 2rem;
    left: 2rem;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    font-size: 0.65rem;
    color: #888;
  }
</style>
</head>
<body>

<div class="side">
  <span class="nav-left">© Mohmad Sahil</span>
  <div class="socials">
    <span>GitHub</span>
    <span>LinkedIn</span>
    <span>Email</span>
  </div>
</div>

<div class="center">
  <ul class="nav-center">
    <li>Projects</li>
    <li>About</li>
    <li>Contact</li>
  </ul>

  <span class="i-am">I am</span>


  <div class="name-wrap">
    <h1 class="name">MOHMAD SAHIL</h1>
  </div>


  <div class="roles">
    <span>// Independent Technologist //</span>
    <span>&</span>
    <span>// Student Engineer //</span>
  </div>
</div>


<div class="side">
  <span class="nav-right">ssahil.com</span>
</div>

</body>
</html>
